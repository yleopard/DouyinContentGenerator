services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: douyin_content
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: douyin2026
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: src/DouyinContentGenerator.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Database=douyin_content;Username=postgres;Password=douyin2026;SSL Mode=Disable
      ConnectionStrings__Redis: redis:6379
      JwtSettings__Secret: dev-jwt-secret-key-for-testing-at-least-32-chars
      # 通义 (默认)
      AIProviders__ImageGeneration__ActiveProvider: tongyi_wanxiang
      AIProviders__TongyiWanxiang__ApiKey: ${TONGYI_API_KEY:-dev-tongyi-key}
      AIProviders__TongyiWanxiang__Model: wan2.1-t2i-turbo
      AIProviders__TextGeneration__ActiveProvider: tongyi_qianwen
      AIProviders__TongyiQianwen__ApiKey: ${TONGYI_API_KEY:-dev-tongyi-key}
      AIProviders__TongyiQianwen__Model: qwen-turbo
      # 智谱 GLM
      AIProviders__GlmCogView__ApiKey: ${GLM_API_KEY:-dev-glm-key}
      AIProviders__GlmCogView__Model: cogview-3-flash
      AIProviders__Glm__ApiKey: ${GLM_API_KEY:-dev-glm-key}
      AIProviders__Glm__Model: glm-4-flash
      # 小米 MiMo
      AIProviders__XiaomiMiMo__ApiKey: ${XIAOMI_API_KEY:-dev-xiaomi-key}
      AIProviders__XiaomiMiMo__Model: MiMo-V2-Flash
      CostControl__DailyBudget: "200.00"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
